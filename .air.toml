root = "."
testdata_dir = "testdata"
tmp_dir = "air_tmp"

[build]
  args_bin = ["serve","--print-config=false"]
  bin = "./compose.ranger-ims-go"
  cmd = "go run bin/build/build.go -output-app=compose.ranger-ims-go"
  delay = 100
  exclude_dir = [
    ".git",
    ".idea",
    "bin",
    "ims-attachments",
    "node_modules",
    "playwright",
    "web/typescripttest",
  ]
  exclude_file = [
    "compose.ranger-ims-go",
    "coverage.out",
    "directory/clubhousedb/*.go",
    "store/imsdb/*.go",
    "web/static/*.js",
    "web/template/*_templ.go",
  ]

  #  ]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go","tpl","tmpl","templ","html","css","scss","js","ts","sql","jpeg","jpg","gif","png","bmp","svg","webp","ico","env"]
  include_file = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_scroll = true
