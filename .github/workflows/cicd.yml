# Docs: https://docs.github.com/en/actions

name: CI/CD

permissions:
  contents: read

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]


defaults:
  run:
    shell: bash


env:
  AWS_DEPLOY_ROLE: "arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ranger-gha-deploy"
  AWS_ECR_IMAGE_NAME: "/rangers/ranger-ims-go"
  AWS_ECS_CLUSTER: rangers
  AWS_ECS_CONTAINER_NAME: ranger-ims-go
  AWS_ECS_SERVICE_STAGING: ranger-ims-go-staging-fg
  AWS_ECS_TASK_DEFINITION_ARN_STAGING: "arn:aws:ecs:us-west-2:${{ secrets.AWS_ACCOUNT_ID }}:task-definition/ranger-ims-go-staging-fg"
  AWS_ECS_TASK_DEFINITION_FAMILY_STAGING: ranger-ims-go-staging-fg
  AWS_REGION: us-west-2


jobs:

  lint:

    name: Linters

    runs-on: ubuntu-latest

    steps:

      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.astral.sh:443
            *.github.com:443
            *.githubusercontent.com:443
            *.go.dev:443
            *.golang.org:443
            cdn.datatables.net:443
            cdn.jsdelivr.net:443
            code.jquery.com:443
            dl.google.com:443
            files.pythonhosted.org:443
            github.com:443
            go.dev:443
            golang.org:443
            pypi.org:443
            storage.googleapis.com:443

      - name: Checkout source code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      # Generated code isn't checked in, so it has to exist before anything can
      # compile. This also fetches the external client deps that static.go embeds.
      - name: Generate code and fetch external build dependencies
        run: go run bin/build/build.go -generate-only

      - name: Install Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Run pre-commit checks
        run: uvx pre-commit run --all-files


  build:

    name: Build application

    runs-on: ubuntu-latest

    steps:

      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.codecov.io:443
            *.docker.com:443
            *.docker.io:443
            *.github.com:443
            *.githubusercontent.com:443
            *.golang.org:443
            *.sentry.io:443
            cdn.datatables.net:443
            cdn.jsdelivr.net:443
            code.jquery.com:443
            dl.google.com:443
            github.com:443
            go.dev:443
            golang.org:443
            keybase.io:443
            storage.googleapis.com:443

      - name: Checkout source code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      # Generated code isn't checked in, so it has to exist before anything can
      # compile. This also fetches the external client deps that static.go embeds.
      # tsgo is the TypeScript type checker, so this step is what makes a type
      # error in web/typescript/ fail the build.
      - name: Generate code and fetch external build dependencies
        run: go run bin/build/build.go -generate-only

      - name: Compile, test, and cover
        run: go test -race -covermode=atomic -coverprofile=coverage.txt --coverpkg ./... ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.txt
          env_vars: GITHUB_REF,GITHUB_COMMIT,GITHUB_USER,GITHUB_WORKFLOW
          fail_ci_if_error: false
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_COMMIT: ${{ github.sha }}
          GITHUB_USER: ${{ github.actor }}
          GITHUB_WORKFLOW: ${{ github.workflow }}


  typescript-test:

    name: TypeScript tests

    runs-on: ubuntu-latest

    steps:

      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.github.com:443
            *.githubusercontent.com:443
            *.golang.org:443
            cdn.datatables.net:443
            cdn.jsdelivr.net:443
            code.jquery.com:443
            dl.google.com:443
            github.com:443
            go.dev:443
            golang.org:443
            registry.npmjs.org:443
            storage.googleapis.com:443


      - name: Checkout source code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: "go.mod"

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: ".nvmrc"

      # The templ-generated Go isn't checked in, and the fixture renderer below
      # needs it in order to compile.
      - name: Generate code and fetch external build dependencies
        run: go run bin/build/build.go -generate-only

      - name: Install npm dependencies
        run: npm ci

      # Vitest transpiles the TypeScript without type-checking it, so this is a
      # separate step. The web/typescript sources are covered by the tsgo run in
      # the generate step above; this covers the test sources.
      - name: Type-check TypeScript tests
        run: npm run typecheck

      # The "pretest" npm script renders the templ HTML fixtures (via Go)
      # that the Vitest tests run against; `npm test` runs it automatically.
      - name: Run TypeScript tests
        run: npm test


  docker-build:

    name: Build Docker image

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            *.docker.com:443
            *.docker.io:443
            *.githubusercontent.com:443
            *.golang.org:443
            cdn.datatables.net:443
            cdn.jsdelivr.net:443
            code.jquery.com:443
            dl-cdn.alpinelinux.org:443
            github.com:443
            storage.googleapis.com:443

      - name: Checkout source code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # The image now compiles sqlc/templ/tsgo and runs them, because none of
      # their output is checked in. `mode=max` on the cache export is what keeps
      # that affordable: the default `mode=min` only caches the last layer of the
      # final stage, which caches nothing useful in a multi-stage build. The
      # Dockerfile builds the generators in a layer keyed only on go.mod/go.sum,
      # so source-only changes restore it from cache instead of rebuilding.
      - name: Build Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: "ranger-ims-go:${{ github.sha }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # `load: true` exports to the local Docker daemon, which can't take the
          # attestation manifest list that buildx would otherwise attach.
          provenance: false

      - name: Save Docker image
        run: docker image save "ranger-ims-go:${{ github.sha }}" | gzip -9 > docker_image.tgz

      - name: Upload Docker image artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docker
          path: docker_image.tgz


  docker-test:

    name: Test Docker image

    needs: [docker-build]

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.docker.com:443
            *.docker.io:443
            *.golang.org:443
            cdn.datatables.net:443
            cdn.jsdelivr.net:443
            code.jquery.com:443
            dl-cdn.alpinelinux.org:443
            github.com:443
            storage.googleapis.com:443

      - name: Checkout source code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download Docker image artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker

      - name: Load Docker image
        run: gzip --uncompress --stdout docker_image.tgz | docker image load

      - name: Test Docker image
        run: ./bin/test_docker
        env:
          IMAGE_TAG: ${{ github.sha }}


  deploy-staging:
    name: Deploy to staging

    needs: [lint, build, typescript-test, docker-test]
    if: ${{ github.ref == 'refs/heads/master' }}

    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      id-token: write

    steps:

      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.amazonaws.com:443
            *.docker.io:443

      - name: Download Docker image artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docker

      - name: Load Docker image
        run: gzip --uncompress --stdout docker_image.tgz | docker image load

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE }}
          role-session-name: ranger-gha-${{ github.repository_id }}-${{ github.job }}-${{ github.run_id }}

      - name: Login to AWS ECR
        id: aws-login-ecr
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Push docker image to Amazon ECR
        run: |
          image_repository="${{ steps.aws-login-ecr.outputs.registry }}${{ env.AWS_ECR_IMAGE_NAME }}"
          docker login
          # Push SHA tag
          docker tag "ranger-ims-go:${{ github.sha }}" "${image_repository}:${{ github.sha }}"
          docker push "${image_repository}:${{ github.sha }}"
          # Push staging rollback tag
          if docker pull "${image_repository}:staging"; then
            echo "Pushing rollback tag for staging"
            docker tag "${image_repository}:staging" "${image_repository}:staging_rollback"
            docker push "${image_repository}:staging_rollback"
          fi
          # Push staging tag
          echo "Pushing staging tag"
          docker tag "${image_repository}:${{ github.sha }}" "${image_repository}:staging"
          docker push "${image_repository}:staging"

      - name: Get current date
        id: date
        run: echo "date=$(date "+%Y-%m-%dT%H:%M:%S")" >> "${GITHUB_OUTPUT}"

      - name: Fetch and update current task definition
        id: new-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@138c24f321fdbdf7edee4a685519d253cae2cdea # v1.9.0
        with:
          task-definition-arn: "${{ env.AWS_ECS_TASK_DEFINITION_ARN_STAGING }}"
          task-definition-family: "${{ env.AWS_ECS_TASK_DEFINITION_FAMILY_STAGING }}"
          container-name: "${{ env.AWS_ECS_CONTAINER_NAME }}"
          image: "${{ steps.aws-login-ecr.outputs.registry }}${{ env.AWS_ECR_IMAGE_NAME }}:${{ github.sha }}"
          environment-variables: |
            GHA_ACTOR_ID=${{ github.actor_id }}
            GHA_ACTOR=${{ github.actor }}
            GHA_EVENT_NAME=${{ github.event_name }}
            GHA_JOB=${{ github.job }}
            GHA_REF=${{ github.ref }}
            GHA_RUN_ATTEMPT=${{ github.run_attempt }}
            GHA_RUN_ID=${{ github.run_id }}
            GHA_RUN_NUMBER=${{ github.run_number }}
            GHA_TRIGGERING_ACTOR=${{ github.triggering_actor }}
            GHA_WORKFLOW=${{ github.workflow }}
            GIT_SHA=${{ github.sha }}
            TASK_UPDATED=${{ steps.date.outputs.date }}

      - name: Update task definition and ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@c465972ecbd160473f22e683363b422a5412a3de # v2.6.3
        with:
          task-definition: "${{ steps.new-task-definition.outputs.task-definition }}"
          service: "${{ env.AWS_ECS_SERVICE_STAGING }}"
          cluster: "${{ env.AWS_ECS_CLUSTER }}"
          wait-for-service-stability: true
