# Docs: https://docs.github.com/en/code-security/code-scanning/introduction-to-code-scanning/about-code-scanning-with-codeql
# Example config: https://github.com/actions/starter-workflows/blob/main/code-scanning/codeql.yml

name: "CodeQL Advanced"

permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]


jobs:

  analyze:

    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          # Not autobuild: the generated code (sqlc/templ/tsgo) isn't checked in,
          # and neither are the client deps that static.go embeds, so a bare
          # `go build` can't work. The manual steps below produce both first.
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:

      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Manual build mode requires the build to happen between init and analyze.
      - name: Build Go
        if: matrix.language == 'go'
        run: |
          go run bin/build/build.go -generate-only
          go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
